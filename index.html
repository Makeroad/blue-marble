<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🎲 Blue Marble</title>

<!-- CSS: 依存順序でロード -->
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/board.css">
<link rel="stylesheet" href="css/ui.css">
<link rel="stylesheet" href="css/modal.css">
<link rel="stylesheet" href="css/rulebook.css">
</head>
<body>

<!-- ===== タイトル画面 ===== -->
<div id="titleScreen">
  <h1>🎲 BLUE MARBLE</h1>
  <p class="title-sub">부루마블 · 모노폴리 · 모두의마블</p>

  <div class="section-label">모드 선택</div>
  <div class="mode-select">
    <button class="mode-btn active" data-mode="bluemarble">부루마블</button>
    <button class="mode-btn"        data-mode="monopoly">모노폴리</button>
    <button class="mode-btn"        data-mode="marblemoa">모두의마블</button>
  </div>

  <p id="modeDesc" class="mode-desc"></p>

  <button class="title-rulebook-btn" id="titleRulebook">📖 룰북 보기</button>

  <div class="section-label">인원 선택</div>
  <div class="player-select">
    <button class="player-btn active" data-count="2">2명</button>
    <button class="player-btn"        data-count="3">3명</button>
    <button class="player-btn"        data-count="4">4명</button>
  </div>

  <button id="startBtn">게임 시작 🎲</button>
</div>

<!-- ===== ゲーム画面 ===== -->
<div id="gameScreen">
  <!-- ボードエリア -->
  <div id="boardWrapper">
    <div id="board">
      <!-- マスはJSで動的生成 -->
      <div id="boardCenter">
        <div id="centerTitle">BLUE MARBLE</div>
        <div id="centerMode"></div>
        <div id="diceArea">
          <div class="dice-num" id="die1">?</div>
          <div class="dice-num" id="die2">?</div>
        </div>
      </div>
    </div>
  </div>

  <!-- サイドパネル -->
  <div id="sidePanel">
    <!-- プレイヤーカード -->
    <div id="playersContainer"></div>

    <!-- アクションボタン -->
    <div id="actionArea">
      <div id="turnInfo" class="turn-info">게임을 준비 중...</div>
      <div class="btn-row">
        <button id="rollBtn" disabled>🎲 주사위</button>
        <button id="buildBtn" disabled>🏠 건설</button>
      </div>
      <button id="tradeBtn"    style="display:none">🤝 거래하기</button>
      <button id="jailPayBtn"  style="display:none">💰 보석금 납부</button>
      <button id="jailCardBtn" style="display:none">🃏 탈출권 사용</button>
    </div>
  </div>
</div>

<!-- ===== 룰북 버튼 (고정) ===== -->
<button id="ruleBookBtn" title="룰북">📖</button>

<!-- ===== モーダルバックドロップ ===== -->
<div id="modalBackdrop">
  <div class="modal-sheet" id="modalSheet">
    <h2 id="modalTitle"></h2>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<!-- ===== JS: 依存順序でロード ===== -->
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/animation.js"></script>
<script src="js/modal.js"></script>
<script src="js/ai.js"></script>
<script src="js/rulebook.js"></script>
<script src="js/game.js"></script>

</body>
</html>
